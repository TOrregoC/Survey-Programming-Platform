name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: survey
          POSTGRES_PASSWORD: survey
          POSTGRES_DB: survey_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U survey -d survey_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://survey:survey@localhost:5432/survey_test?schema=public
      JWT_SECRET: ci-jwt-secret-please-replace
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
